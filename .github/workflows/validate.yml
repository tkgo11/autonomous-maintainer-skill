name: Validate skill package

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SKILL.md
        run: python3 scripts/validate_skill.py SKILL.md
      - name: Test installers
        run: bash tests/test_installers.sh
